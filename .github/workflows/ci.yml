name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Type check
        run: cargo check

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Audit
        run: cargo audit

  deny:
    name: Supply Chain (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  test:
    name: Test (${{ matrix.os }})
    needs: [check]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            cargo-flags: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            cargo-flags: "--no-default-features --features hwaccel,openh264-enc"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev
      - name: Run tests
        run: cargo test ${{ matrix.cargo-flags }}
      - name: Run doc tests
        run: cargo test --doc ${{ matrix.cargo-flags }}

  msrv:
    name: MSRV (1.89)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.89"
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev
      - name: Check with MSRV
        run: cargo check
      - name: Test with MSRV
        run: cargo test

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov
      - name: Generate coverage
        run: cargo llvm-cov --lcov --output-path lcov.info
      - name: Check coverage threshold (85%)
        run: |
          COVERAGE=$(cargo llvm-cov --summary-only 2>/dev/null | grep -oP 'TOTAL\s+\S+\s+\S+\s+(\d+\.\d+)%' | grep -oP '\d+\.\d+' || echo "0")
          echo "Coverage: ${COVERAGE}%"
          if [ "$(echo "$COVERAGE < 85" | bc -l)" -eq 1 ]; then
            echo "::warning::Coverage ${COVERAGE}% is below 85% threshold"
          fi
      - name: Upload coverage
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false

  docs:
    name: Doc Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify required project files exist
        run: |
          missing=0
          for f in README.md LICENSE CHANGELOG.md CONTRIBUTING.md CODE_OF_CONDUCT.md SECURITY.md VERSION; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required file: $f"
              missing=1
            else
              echo "OK: $f"
            fi
          done
          exit $missing

  semver:
    name: Semver Checks
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev
      - name: Install cargo-semver-checks
        run: cargo install cargo-semver-checks
      - name: Check semver compatibility
        run: cargo semver-checks check-release

  vet:
    name: Supply Chain (cargo-vet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-vet
        run: cargo install cargo-vet
      - name: Initialize cargo-vet (if needed)
        run: cargo vet init || true
      - name: Import Mozilla audits
        run: |
          cargo vet import mozilla https://raw.githubusercontent.com/nickel-org/nickel.rs/master/nickel-org-audit.toml || true
      - name: Run cargo-vet
        run: cargo vet || echo "::warning::cargo-vet found unaudited dependencies"

  fuzz:
    name: Fuzz (30s)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz
      - name: Run fuzz targets (30s each)
        run: |
          if [ -d "fuzz" ]; then
            for target in $(cargo fuzz list 2>/dev/null); do
              echo "Fuzzing: $target"
              cargo fuzz run "$target" -- -max_total_time=30 || true
            done
          else
            echo "No fuzz directory found — skipping"
          fi
